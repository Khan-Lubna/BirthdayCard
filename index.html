<!DOCTYPE html>
<html>
    <head>
        <title>Birthday Card</title>
        <link rel="stylesheet" type="text/css" href="style.css">
    </head>
    <body>
        <div class="container">
            <div class="cake">🎂</div>
            <h1>It's Your Birthday!</h1>
            <p class="subtitle">Enter your name to open your birthday card</p>
            <input placeholder="Enter your name" id="display" class="name-input">
            <br>
            <button type="button" onclick="showname()" id="btn" class="open-btn">Open My Card 🎁</button>
        </div>
        <div class="balloons">
            <span class="balloon" style="left:10%"></span>
            <span class="balloon" style="left:25%"></span>
            <span class="balloon" style="left:50%"></span>
            <span class="balloon" style="left:75%"></span>
            <span class="balloon" style="left:90%"></span>
        </div>
        <script src="script.js"></script>
    </body>
</html>
